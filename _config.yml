# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Kusa Jekyll Settings
site: Kusa
title: Rajil Vembe's Blog
description: A collection of my thoughts on AI, ML, and programming.
greetings: Hi 👋
data-theme: dark
googlewebfonts: family=Play:wght@400;700&family=Source+Code+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,300;1,400;1,500;1,600;1,700;1,900
lang: en-US
timezone: America/New_York
repo: https://github.com/rajilsaj/rajilsaj.github.io

author:
  name: Rajil Vembe
  bio: AI & ML Enthusiast
  about_text: Hi there! I'm Rajil. I write about AI, Machine Learning, and Software Development.
  username: rajilsaj
  github: rajilsaj
  twitter: rajilsaj
  email: rajil@example.com

url: "http://localhost:4000"
baseurl: ""
permalink: /:year/:month/:day/:slug
tag_page_layout: tag
tag_page_dir: tag

# Disqus
disqus_shortname: rajilsaj-github-io

# Build settings
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed

# paginate: 5
# paginate_path: "/page:num/"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:year/:month/:day/:slug

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled: true
  collections: false

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
