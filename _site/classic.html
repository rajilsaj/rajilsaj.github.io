        <!-- FOOTER -->

    </div>
    <script>
        class TextScramble {
            constructor(el) {
                this.el = el;
                this.chars = "!<>-_\\/[]{}—=+*^?#________";
                this.update = this.update.bind(this);
            }

            setText(newText) {
                const oldText = this.el.innerText;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise(resolve => this.resolve = resolve);
                this.queue = [];

                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || "";
                    const to = newText[i] || "";
                    const start = Math.floor(Math.random() * 40);
                    const end = start + Math.floor(Math.random() * 40);
                    this.queue.push({ from, to, start, end, char: null });
                }

                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }

            update() {
                let output = "";
                let complete = 0;

                for (let i = 0; i < this.queue.length; i++) {
                    let { from, to, start, end, char } = this.queue[i];

                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span class="dud">${char}</span>`;
                    } else {
                        output += from;
                    }
                }

                this.el.innerHTML = output;

                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                    this.frame++;
                }
            }

            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const phrases = ['Software Engineer', 'AI Engineer', 'Builder', 'Student', 'hacker'];
            const el = document.getElementById("scramble-role");

            if (!el) return; // safety check if id is missing

            const fx = new TextScramble(el);
            let counter = 0;

            function next() {
                fx.setText(phrases[counter]).then(() => {
                    setTimeout(next, 3000); // wait 3s before switching again
                });
                counter = (counter + 1) % phrases.length;
            }

            next();
        });
    </script>



    <script>
        // Init UI after DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            // Hamburger toggle
            var toggle = document.getElementById('menu-toggle');
            var nav = document.getElementById('main-nav');
            if (toggle && nav) {
                toggle.addEventListener('click', function () {
                    nav.classList.toggle('open');
                });
            }

            // Dynamic footer year
            var yearEl = document.getElementById('footer-year');
            if (yearEl) {
                var year = new Date().getFullYear();
                yearEl.textContent = year;
                yearEl.setAttribute('datetime', String(year));
            }
        });
    </script>
