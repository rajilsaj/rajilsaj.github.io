---
layout: default
---

<div class="home">
    {% include profile.html %}

    {%- if site.posts.size > 0 -%}
    <ul class="post-list">
        {%- for post in site.posts -%}
        <li class="post-item">
            <a class="post-link" href="{{ post.url | relative_url }}">
                <span class="post-title">{{ post.title | escape }}</span>
                <span class="post-date">{{ post.date | date: "%-d %b %Y" }}</span>
            </a>
        </li>
        {%- endfor -%}
    </ul>
    {%- endif -%}
</div>
