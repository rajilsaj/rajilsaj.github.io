---
layout: default
title: Home
---

<ul class="post-list" style="list-style: none; padding: 0;">
    {% for post in site.posts %}
    <li style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
        <a href="{{ post.url | relative_url }}" style="text-decoration: none;">
            <h2 style="margin: 0; font-size: 1.5rem;">{{ post.title }}</h2>
            <time style="font-size: 0.875rem; color: var(--text-muted);">{{ post.date | date: "%B %d, %Y" }}</time>
        </a>
    </li>
    {% endfor %}
</ul>
