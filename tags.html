---
layout: default
---



<section class="posts">
  <div class="flex-row-between">
    <h1>Tags #{{page.tag}}</h1>
    <a href="{{ '/' | relative_url }}"><i class="fa fa-home" aria-hidden="true"></i> Back to Home</a>
  </div>

  {% assign sorted_tags = site.tags | sort %}
  <ul class="posts" style="display: block;">
    {% for tag in sorted_tags %}
    {% assign t = tag | first %}
    {% assign posts = tag | last %}
    <li>
      <a class="posts" href="{{ '/tag/' | append: t | append: '/' | relative_url }}">{{ t }} <span
          class="tag-posts-num">({{ posts.size }})</a>
    </li>
    {% endfor %}
  </ul>

</section>
