<div class="sidebar">
    <div class="sidebar-header">
        <a href="{{ '/' | relative_url }}" class="sidebar-title">{{ site.title | escape }}</a>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search posts..." autocomplete="off">
        <ul id="results-container"></ul>
    </div>

    <nav class="sidebar-nav">
        <ul class="nav-list">
            <li class="nav-item">
                <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
            </li>
            <li class="nav-item">
                <a href="{{ '/about/' | relative_url }}"
                    class="nav-link {% if page.url == '/about/' %}active{% endif %}">About</a>
            </li>
        </ul>
    </nav>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
        <span class="theme-icon">🌙</span>
        <span class="theme-text">Dark Mode</span>
    </button>
</div>

<!-- Simple-Jekyll-Search -->
<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
<script>
    window.addEventListener('load', function () {
        SimpleJekyllSearch({
            searchInput: document.getElementById('search-input'),
            resultsContainer: document.getElementById('results-container'),
            json: '{{ "/search.json" | relative_url }}',
            searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
            noResultsText: '<li><a href="#">No results found</a></li>',
            limit: 10,
            fuzzy: false
        });

        const input = document.getElementById('search-input');
        const results = document.getElementById('results-container');

        if (input && results) {
            input.addEventListener('input', () => {
                results.style.display = input.value ? 'block' : 'none';
            });

            // Close search on click outside
            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !results.contains(e.target)) {
                    results.style.display = 'none';
                }
            });
        }
    });
</script>
